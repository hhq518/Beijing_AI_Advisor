# 定义 Compose 的文件版本
version: "3.8"

# 定义服务（你的项目就是一个服务）
services:
  beijing-property-agent:
    # 构建镜像的配置：从当前目录的 Dockerfile 构建
    build: .
    # 容器名称
    container_name: beijing-property-agent
    # 端口映射：主机的 7860 端口映射到容器的 7860 端口
    ports:
      - "7860:7860"
    # 环境变量：加载你项目里的 .env 文件
    env_file:
      - .env
    # 重启策略：容器退出时自动重启（可选，面试用可以不加）
    restart: unless-stopped